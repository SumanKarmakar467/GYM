<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymForge - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; text-align: center; padding: 24px;
    }
    .logo { font-size: 28px; font-weight: 900; margin-bottom: 32px; letter-spacing: -1px; }
    .logo span { color: #f97316; }
    .icon { font-size: 64px; margin-bottom: 24px; display: block; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 28px; max-width: 320px; }
    button {
      background: #f97316; color: #fff; border: none;
      padding: 14px 28px; border-radius: 10px; font-size: 15px;
      font-weight: 700; cursor: pointer;
    }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div>
    <div class="logo">GYM<span>FORGE</span></div>
    <span class="icon pulse">📡</span>
    <h1>You're offline</h1>
    <p>No internet connection. Your cached workouts and todos are still available once you reconnect.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
